
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MetaXP - Dashboard de Produtividade</title>
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,700,900" rel="stylesheet">
    <link href="css/sb-admin-2.min.css" rel="stylesheet">
</head>
<body id="page-top">
    <!-- Conteúdo do dashboard de metas pessoais e gamificação -->
    <div id="wrapper">
        <!-- Sidebar, Topbar e conteúdo omitidos para brevidade -->
        <div class="container-fluid">
            <h1 class="h3 mb-4 text-gray-800">MetaXP - Sua Jornada de Produtividade</h1>
            <div class="row">
                <!-- Card de Progresso de Meta -->
                <div class="col-xl-3 col-md-6 mb-4">
                    <div class="card border-left-success shadow h-100 py-2">
                        <div class="card-body">
                            <div class="row no-gutters align-items-center">
                                <div class="col mr-2">
                                    <div class="text-xs font-weight-bold text-success text-uppercase mb-1">
                                        Progresso da Meta
                                    </div>
                                    <div class="h5 mb-0 font-weight-bold text-gray-800">72%</div>
                                    <div class="small text-gray-500">Você está no caminho certo!</div>
                                </div>
                                <div class="col-auto">
                                    <i class="fas fa-check-circle fa-2x text-gray-300"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Card de Conquistas -->
                <div class="col-xl-3 col-md-6 mb-4">
                    <div class="card border-left-primary shadow h-100 py-2">
                        <div class="card-body">
                            <div class="row no-gutters align-items-center">
                                <div class="col mr-2">
                                    <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">
                                        Conquistas
                                    </div>
                                    <div class="h5 mb-0 font-weight-bold text-gray-800">5 Conquistas</div>
                                    <div class="small text-gray-500">Você está avançando rapidamente!</div>
                                </div>
                                <div class="col-auto">
                                    <i class="fas fa-trophy fa-2x text-gray-300"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Card de IA - Próxima Meta Sugerida -->
                <div class="col-xl-3 col-md-6 mb-4">
                    <div class="card border-left-warning shadow h-100 py-2">
                        <div class="card-body">
                            <div class="row no-gutters align-items-center">
                                <div class="col mr-2">
                                    <div class="text-xs font-weight-bold text-warning text-uppercase mb-1">
                                        IA: Próxima Meta Sugerida
                                    </div>
                                    <div class="h5 mb-0 font-weight-bold text-gray-800">Meditação por 10 minutos</div>
                                    <div class="small text-gray-500">A IA sugere metas para aumentar sua produtividade.</div>
                                </div>
                                <div class="col-auto">
                                    <i class="fas fa-brain fa-2x text-gray-300"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
